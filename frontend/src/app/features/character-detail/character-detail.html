<section class="character">
  <button type="button" class="back-link" (click)="goBack()">← Volver</button>

  @if (loading()) {
    <div class="state">
      <span class="portal-spinner" aria-hidden="true"></span>
      <p>Abriendo portal…</p>
    </div>
  } @else if (error()) {
    <div class="state state--error" role="alert">
      <p>{{ error() }}</p>
    </div>
  } @else if (character(); as char) {
    <article class="card">
      <img class="card__image" [src]="char.image" [alt]="char.name" />
      <div class="card__body">
        <h1 class="card__name">{{ char.name }}</h1>
        <span class="card__status" [attr.data-status]="char.status">
          {{ char.status }}
        </span>

        <dl class="facts">
          <div class="fact">
            <dt>Especie</dt>
            <dd>{{ char.species }}</dd>
          </div>
          <div class="fact">
            <dt>Género</dt>
            <dd>{{ char.gender }}</dd>
          </div>
          <div class="fact">
            <dt>Origen</dt>
            <dd>{{ char.origin }}</dd>
          </div>
          <div class="fact">
            <dt>Ubicación</dt>
            <dd>{{ char.location }}</dd>
          </div>
        </dl>
      </div>
    </article>
  }
</section>
